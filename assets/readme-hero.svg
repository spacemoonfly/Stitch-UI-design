<svg width="1600" height="560" viewBox="0 0 1600 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stitch UI design Skill 头图">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090012"/>
      <stop offset="55%" stop-color="#170028"/>
      <stop offset="100%" stop-color="#05000d"/>
    </linearGradient>
    <linearGradient id="neonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <linearGradient id="neonB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8b5cf6" stroke-opacity="0.17" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="560" fill="url(#bg1)"/>
  <rect width="1600" height="560" fill="url(#grid)"/>

  <circle cx="1320" cy="140" r="220" fill="#ff2bd6" fill-opacity="0.14"/>
  <circle cx="260" cy="470" r="210" fill="#00f7ff" fill-opacity="0.14"/>

  <path d="M0 460 C300 380 520 520 820 430 C1140 330 1320 470 1600 390 L1600 560 L0 560 Z" fill="#0b1220" fill-opacity="0.72"/>

  <g filter="url(#glow)">
    <rect x="84" y="110" width="1432" height="330" rx="26" fill="none" stroke="url(#neonA)" stroke-width="3"/>
    <rect x="102" y="128" width="1396" height="294" rx="20" fill="none" stroke="url(#neonB)" stroke-opacity="0.65" stroke-width="1.8"/>
  </g>

  <g transform="translate(145,190)">
    <text x="0" y="0" fill="url(#neonA)" font-family="'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="88" font-weight="700" letter-spacing="1">Stitch UI design Skill</text>
    <text x="0" y="82" fill="#d7d3ff" font-family="'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="38" opacity="0.96">用途：基于 DESIGN.md 的 Web UI 设计与实现</text>
  </g>

  <g opacity="0.75">
    <path d="M1240 225 L1450 225" stroke="#00f7ff" stroke-width="3"/>
    <path d="M1240 255 L1510 255" stroke="#ff2bd6" stroke-width="2.4"/>
    <path d="M1240 285 L1420 285" stroke="#7c4dff" stroke-width="2"/>
  </g>
</svg>
