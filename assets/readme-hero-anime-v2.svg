<svg width="1600" height="560" viewBox="0 0 1600 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stitch UI design Skill hero banner v2">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#160b36"/>
      <stop offset="48%" stop-color="#2a1a63"/>
      <stop offset="100%" stop-color="#0f0726"/>
